<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>اكتشف عظام جسمك | لعبة الهيكل العظمي التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a2f2f 0%, #1a4a4a 100%);
            min-height: 100vh;
            color: #fef5e6;
        }

        .game-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffdd99, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            color: #ffefc0;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            border: 1px solid #f4b942;
        }

        .game-container {
            background: #1e3a32;
            border-radius: 32px;
            padding: 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid #f4b942;
            margin-bottom: 1.5rem;
        }

        /* Responsive iframe wrapper (16:9) */
        .game-iframe-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 24px;
        }

        .game-iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .game-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .fullscreen-btn, .minimise-btn {
            background: #f4b942;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .fullscreen-btn:hover, .minimise-btn:hover {
            transform: scale(1.1);
        }

        .hidden {
            display: none;
        }

        .game-tags {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .game-tag {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 18px;
            border-radius: 50px;
            color: #ffefc0;
            font-size: 0.9rem;
            border: 1px solid #f4b942;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .game-wrapper {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <h1><i class="fas fa-skull"></i> اكتشف عظام جسمك</h1>
            <p>اضغط على أي عظمة في الصورة لتعرف اسمها ووظيفتها بالعربية</p>
            <div class="badge-row">
                <span class="badge"><i class="fas fa-child"></i> للأعمار 9-10 سنوات</span>
                <span class="badge"><i class="fas fa-cube"></i> نقاط تفاعلية</span>
                <span class="badge"><i class="fas fa-language"></i> بالعربية</span>
                <span class="badge"><i class="fas fa-download"></i> بدون اتصال بالإنترنت</span>
            </div>
        </div>

        <div class="game-container">
            <div id="game-iframe-wrapper" class="game-iframe-wrapper">
                <!-- Your exported Lumi hotspots game -->
                <iframe id="game-iframe" src="skeleton-hotspots.html" allow="fullscreen"></iframe>
            </div>
            <div class="game-buttons">
                <button id="fullscreen-btn" class="fullscreen-btn" title="شاشة كاملة">
                    <svg width="24" height="24" viewBox="0 0 33 33" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10.12 31H2V22.88M31 22.88V31H22.88M22.88 2H31V10.12M2 10.12V2H10.12" stroke="#1e2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
                <button id="minimise-btn" class="minimise-btn hidden" title="تصغير">
                    <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="#1e2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
                        <polyline points="8 3 8 8 3 8"></polyline>
                        <polyline points="21 8 16 8 16 3"></polyline>
                        <polyline points="3 16 8 16 8 21"></polyline>
                        <polyline points="16 21 16 16 21 16"></polyline>
                    </svg>
                </button>
            </div>
        </div>

        <div class="game-tags">
            <span class="game-tag">🔬 علوم، أحياء</span>
            <span class="game-tag">🦴 الهيكل العظمي</span>
            <span class="game-tag">🎮 تعلم باللعب</span>
            <span class="game-tag">📍 نقاط ساخنة تفاعلية</span>
        </div>

        <footer>
            <i class="fas fa-heart"></i> تعلم ممتع - اكتشف أسرار عظام جسمك بالعربية
        </footer>
    </div>

    <script>
        // Fullscreen functionality for the iframe wrapper
        const gameContainer = document.getElementById('game-iframe-wrapper');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const minimiseBtn = document.getElementById('minimise-btn');

        function enterFullscreen() {
            if (gameContainer.requestFullscreen) {
                gameContainer.requestFullscreen();
            } else if (gameContainer.webkitRequestFullscreen) {
                gameContainer.webkitRequestFullscreen();
            } else if (gameContainer.msRequestFullscreen) {
                gameContainer.msRequestFullscreen();
            }
            fullscreenBtn.classList.add('hidden');
            minimiseBtn.classList.remove('hidden');
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            fullscreenBtn.classList.remove('hidden');
            minimiseBtn.classList.add('hidden');
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);
        minimiseBtn.addEventListener('click', exitFullscreen);

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.classList.remove('hidden');
                minimiseBtn.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
