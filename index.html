<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر العظام الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="start-screen" class="overlay">
        <div class="modal">
            <i class="fas fa-bone fa-3x" style="color: #4cc9f0; margin-bottom: 20px;"></i>
            <h1>مرحباً بك في مختبر العظام!</h1>
            <p>هل يمكنك إعادة تركيب الهيكل العظمي في مكانه الصحيح؟</p>
            <button id="start-btn">ابدأ التحدي الآن 🚀</button>
        </div>
    </div>

    <div class="app-wrapper">
        <header>
            <div class="stat-badge"><i class="fas fa-star"></i> <span id="score">0</span> / 7</div>
            <div class="progress-container">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </header>

        <main class="game-area">
            <div class="skeleton-canvas" id="drop-container">
                <div class="drop-zone" data-bone="skull" style="top: 2%; left: 38%; width: 24%; height: 18%;"><span>الرأس</span></div>
                <div class="drop-zone" data-bone="ribs" style="top: 22%; left: 30%; width: 40%; height: 22%;"><span>الصدر</span></div>
                <div class="drop-zone" data-bone="spine" style="top: 22%; left: 46%; width: 8%; height: 45%;"><span>العمود الفقري</span></div>
                <div class="drop-zone" data-bone="pelvis" style="top: 48%; left: 35%; width: 30%; height: 12%;"><span>الحوض</span></div>
                <div class="drop-zone" data-bone="arm-l" style="top: 25%; left: 10%; width: 18%; height: 35%;"><span>الذراع</span></div>
                <div class="drop-zone" data-bone="arm-r" style="top: 25%; right: 10%; width: 18%; height: 35%;"><span>الذراع</span></div>
                <div class="drop-zone" data-bone="legs" style="top: 60%; left: 25%; width: 50%; height: 38%;"><span>الأرجل</span></div>
            </div>

            <div class="inventory" id="bone-inventory">
                </div>
        </main>

        <div id="fact-overlay" class="fact-popup hidden">
            <div class="fact-content">
                <i class="fas fa-lightbulb"></i>
                <p id="fact-text"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
