<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغامرة الهيكل العظمي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="start-overlay" class="overlay">
        <div class="modal">
            <h1>🦴 مغامرة بناء الهيكل العظمي</h1>
            <p>هل أنت مستعد لتصبح خبيراً في العظام؟ اسحب الأجزاء وبعثرها في مكانها الصحيح!</p>
            <button id="start-btn">ابدأ اللعب الآن</button>
        </div>
    </div>

    <div id="victory-overlay" class="overlay hidden">
        <div class="modal">
            <h1>🎉 أحسنت يا بطل!</h1>
            <p>لقد قمت ببناء هيكل عظمي قوي جداً!</p>
            <button onclick="location.reload()">إعادة التحدي 🔄</button>
        </div>
    </div>

    <div class="game-container">
        <aside class="inventory">
            <h3>اسحب العظام 🦴</h3>
            <div id="bones-pile" class="bones-pile">
                </div>
        </aside>

        <main class="canvas">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="drop-target-container" class="body-target">
                <div class="drop-zone" data-bone="skull" style="top:5%; left:40%; width:20%; height:15%;"></div>
                <div class="drop-zone" data-bone="ribs" style="top:22%; left:30%; width:40%; height:20%;"></div>
                <div class="drop-zone" data-bone="pelvis" style="top:45%; left:35%; width:30%; height:12%;"></div>
                <div class="drop-zone" data-bone="arm-l" style="top:25%; left:10%; width:15%; height:30%;"></div>
                <div class="drop-zone" data-bone="arm-r" style="top:25%; left:75%; width:15%; height:30%;"></div>
                <div class="drop-zone" data-bone="leg-l" style="top:60%; left:25%; width:15%; height:35%;"></div>
                <div class="drop-zone" data-bone="leg-r" style="top:60%; left:60%; width:15%; height:35%;"></div>
            </div>

            <div id="fact-box" class="fact-box hidden">
                <span id="fact-text"></span>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
