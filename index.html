<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة جسم الإنسان | مختبر العظام</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>بناء الهيكل العظمي</h1>
            <p>اسحب العظام إلى مكانها الصحيح لتتعلم كيف يحميك جسمك!</p>
        </header>

        <div class="game-wrapper">
            <div id="inventory">
                <div class="bone-item" data-target="skull">الجمجمة</div>
                <div class="bone-item" data-target="ribs">القفص الصدري</div>
                <div class="bone-item" data-target="spine">العمود الفقري</div>
                <div class="bone-item" data-target="pelvis">عظم الحوض</div>
                <div class="bone-item" data-target="humerus">عظمة العضد</div>
                <div class="bone-item" data-target="femur">عظمة الفخذ</div>
            </div>

            <div id="canvas">
                <div class="skeleton-silhouette"></div>
                
                <div class="target" id="target-skull" data-bone="skull"></div>
                <div class="target" id="target-ribs" data-bone="ribs"></div>
                <div class="target" id="target-spine" data-bone="spine"></div>
                <div class="target" id="target-pelvis" data-bone="pelvis"></div>
                <div class="target" id="target-humerus" data-bone="humerus"></div>
                <div class="target" id="target-femur" data-bone="femur"></div>
            </div>
        </div>

        <div id="info-modal" class="hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2 id="bone-title">اسم العظمة</h2>
                <p id="bone-fact">المعلومة هنا...</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
